<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>NYC Spots</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script defer src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <style>
    :root {
      --mobile-sheet-height: 50dvh;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      height: 100vh;
    }

    #sidebar {
      width: 320px;
      overflow-y: auto;
      border-right: 1px solid #ddd;
      background: #fafafa;
    }

    #map {
      flex: 1;
    }

    h1 {
      font-size: 18px;
      margin: 0;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid #eee;
    }

    #list {
      padding: 0 16px 16px;
    }

    .place {
      width: 100%;
      display: block;
      padding: 8px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      border-left: 0;
      border-right: 0;
      border-top: 0;
      background: transparent;
      text-align: left;
      font: inherit;
      color: inherit;
    }

    .place:hover {
      background: #f0f0f0;
    }

    .place:focus-visible {
      outline: 2px solid #1d4ed8;
      outline-offset: -2px;
    }

    .rank {
      font-weight: bold;
      margin-right: 6px;
    }

    .checkins {
      color: #666;
      font-size: 12px;
    }

    @media (max-width: 768px) {
      body {
        display: block;
        min-height: 100dvh;
        height: 100dvh;
      }

      #sidebar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 1000;
        width: auto;
        height: var(--mobile-sheet-height);
        border-right: 0;
        border-top: 1px solid #ddd;
        border-radius: 18px 18px 0 0;
        box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.12);
        overflow: hidden;
      }

      .sidebar-header {
        position: sticky;
        top: 0;
        background: #fafafa;
        z-index: 1;
        padding-top: 20px;
      }

      .sidebar-header::before {
        content: "";
        position: absolute;
        top: 8px;
        left: 50%;
        width: 48px;
        height: 5px;
        border-radius: 999px;
        background: #d1d5db;
        transform: translateX(-50%);
      }

      #map {
        height: 100dvh;
        min-height: 100dvh;
      }

      #list {
        height: calc(100% - 70px);
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
    }
  </style>
</head>

<body>
  <div id="sidebar">
    <div class="sidebar-header">
      <h1>Top NYC Spots</h1>
    </div>
    <div id="list"></div>
  </div>

  <div id="map"></div>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const mobileSheetQuery = window.matchMedia("(max-width: 768px)");
      const map = L.map("map", { zoomControl: false }).setView([40.73, -73.98], 12);
      const markerLayer = L.markerClusterGroup({
        showCoverageOnHover: false,
        maxClusterRadius: 40
      });

      const handleViewportChange = () => {
        requestAnimationFrame(() => map.invalidateSize());
      };

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "&copy; OpenStreetMap contributors"
      }).addTo(map);

      map.addLayer(markerLayer);
      mobileSheetQuery.addEventListener("change", handleViewportChange);
      handleViewportChange();

      fetch("ny.json")
        .then((res) => {
          if (!res.ok) {
            throw new Error(`Failed to load ny.json: ${res.status}`);
          }

          return res.json();
        })
        .then((data) => {
          const list = document.getElementById("list");
          const fragment = document.createDocumentFragment();
          const bounds = [];

          data.forEach((place) => {
            const lat = place.latitude;
            const lng = place.longitude;

            bounds.push([lat, lng]);

            const marker = L.marker([lat, lng])
              .bindPopup(
                `<strong>${place.name}</strong><br/>Check-ins: ${place.checkins}`
              );

            markerLayer.addLayer(marker);

            const button = document.createElement("button");
            button.className = "place";
            button.type = "button";

            const rank = document.createElement("span");
            rank.className = "rank";
            rank.textContent = `${place.rank}.`;

            const name = document.createTextNode(` ${place.name}`);

            const checkins = document.createElement("div");
            checkins.className = "checkins";
            checkins.textContent = `${place.checkins} check-ins`;

            button.append(rank, name, checkins);
            button.addEventListener("click", () => {
              markerLayer.zoomToShowLayer(marker, () => {
                map.setView([lat, lng], 15);
                marker.openPopup();
              });
            });

            fragment.appendChild(button);
          });

          list.appendChild(fragment);

          if (bounds.length > 0) {
            const fitBoundsOptions = mobileSheetQuery.matches
              ? { paddingTopLeft: [24, 24], paddingBottomRight: [24, 220] }
              : { padding: [24, 24] };
            map.fitBounds(bounds, fitBoundsOptions);
          }
        })
        .catch((error) => {
          document.getElementById("list").textContent = "Unable to load places.";
          console.error(error);
        });
    });
  </script>
</body>

</html>
